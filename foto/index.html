<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Video Card</title>
<style>
  .card {
    position: relative;
    width: 300px;
    height: 200px;
    overflow: hidden;
    cursor: pointer;
    border-radius: 10px;
    border: 1px solid #ddd;
  }

  .card img,
  .card video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s ease;
  }

  .card video {
    opacity: 0;
    pointer-events: none;
  }

  .card:hover video {
    opacity: 1;
  }

  .card:hover img {
    opacity: 0;
  }
</style>
</head>
<body>

<h1>Hover Video Card</h1>

<div class="card">
  <img src="https://a.storyblok.com/f/338913/1280x1024/b7f3c2d593/911-desktop_5-4.jpg/m/filters:format(webp):quality(80)" alt="Card">
  <video muted preload="none">
    <source src="https://videos.porsche.com/id/911Desktop54Final/hls.m3u8" type="video/mp4">
  </video>
</div>

<script>
  const cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    const video = card.querySelector('video');

    card.addEventListener('mouseenter', () => {
      card.hoverTimeout = setTimeout(() => {
        video.currentTime = 0;
        video.play();
      }, 0);
    });

    card.addEventListener('mouseleave', () => {
      clearTimeout(card.hoverTimeout);
      video.pause();
      video.currentTime = 0;
    });
  });
</script>

</body>
</html>
