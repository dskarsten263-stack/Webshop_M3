<!doctype html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Winkelwagen</title>
    <link rel="stylesheet" href="style.css">
    <script src="cart.js" defer></script>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Shop.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="index.html#Contact">Contact</a></li>
            </ul>

            <div class="logo">
                <img src="foto/LOGO_P.png" alt="Porsche logo" />
            </div>

            <button class="nav-btn">
                <a href="Shop.html">Verder shoppen</a>
            </button>
        </nav>
    </header>

    <section class="cart-page">
        <h1>Winkelwagen</h1>

        <table class="cart-product">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Aantal</th>
                    <th>Prijs p/st</th>
                    <th>Totaal</th>
                    <th>Actie</th>
                </tr>
            </thead>
            <tbody id="products"></tbody>
        </table>

        <p class="empty-message" id="emptyMessage"></p>

        <div class="cart-total-box">
            <p class="cart-total">Totaal: € <span id="totalPrice">0,00</span></p>
            <button class="clear-cart-btn" id="clearCartBtn">Winkelwagen legen</button>
        </div>
    </section>
</body>

</html>
