<!doctype html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Winkelwagen</title>
    <link rel="stylesheet" href="style.css">
    <script src="cart.js" defer></script>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="index.html#Contact">Contact</a></li>
            </ul>

            <div class="logo">
                <img src="foto/LOGO_P.png" alt="Porsche logo">
            </div>

            <button class="nav-btn">
                <a href="shop.html">Verder shoppen</a>
            </button>
        </nav>
    </header>

    <main class="cart-layout">
        <section class="cart-panel">
            <div class="cart-title-row">
                <h2>Selected Cars</h2>
                <p class="subtle-text" id="cartStatus">Loading your cart...</p>
            </div>

            <div id="cartItems" class="cart-items"></div>
        </section>

        <aside class="summary-panel">
            <h2>Order Summary</h2>
            <div class="summary-lines">
                <div class="summary-line">
                    <span>Items</span>
                    <span id="summaryItems">0</span>
                </div>
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">EUR 0,00</span>
                </div>
                <div class="summary-line">
                    <span>Delivery</span>
                    <span id="summaryDelivery">Free</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="summaryTotal">EUR 0,00</span>
                </div>
            </div>

            <div class="summary-actions">
                <a href="shop.html" class="primary-link">Continue Shopping</a>
                <button type="button" id="clearCartButton" class="secondary-button">Clear Cart</button>
            </div>
        </aside>
    </main>
</body>

</html>
